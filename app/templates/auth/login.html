<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --border: rgba(255,255,255,0.07);
            --accent: #c8ff00;
            --accent2: #00f5c8;
            --text: #e8e8f0;
            --muted: #5a5a72;
            --error: #ff4d6d;
            --input-bg: rgba(255,255,255,0.03);
            --glow: rgba(200,255,0,0.15);
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }

        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: drift 12s ease-in-out infinite alternate;
        }

        .bg-orb:nth-child(1) {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #00f5c833 0%, transparent 70%);
            top: -150px; right: -100px;
            animation-delay: 0s;
        }
        .bg-orb:nth-child(2) {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #c8ff0022 0%, transparent 70%);
            bottom: -100px; left: -80px;
            animation-delay: -4s;
            animation-duration: 15s;
        }
        .bg-orb:nth-child(3) {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #a855f718 0%, transparent 70%);
            top: 50%; left: 30%;
            animation-delay: -7s;
            animation-duration: 10s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.1); }
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 48px 44px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow:
                0 0 0 1px rgba(0,245,200,0.04),
                0 32px 80px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.06);
            animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), transparent);
            border-radius: 2px;
            opacity: 0.7;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,245,200,0.08);
            border: 1px solid rgba(0,245,200,0.2);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent2);
            margin-bottom: 24px;
            animation: fadeUp 0.5s 0.2s both;
        }

        .badge-dot {
            width: 6px; height: 6px;
            background: var(--accent2);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 8px;
            color: #fff;
            animation: fadeUp 0.5s 0.3s both;
        }

        h1 span { color: var(--accent2); }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 36px;
            animation: fadeUp 0.5s 0.35s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .field {
            margin-bottom: 20px;
            animation: fadeUp 0.5s both;
        }
        .field:nth-child(1) { animation-delay: 0.4s; }
        .field:nth-child(2) { animation-delay: 0.45s; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
            transition: color 0.2s;
            z-index: 2;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: all 0.25s;
            appearance: none;
            position: relative;
            z-index: 1;
        }

        input::placeholder { color: var(--muted); }

        input:focus {
            border-color: rgba(0,245,200,0.4);
            background: rgba(0,245,200,0.03);
            box-shadow: 0 0 0 3px rgba(0,245,200,0.08);
        }

        .input-wrap:focus-within .input-icon { color: var(--accent2); }

        .forgot {
            display: block;
            text-align: right;
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            margin-top: 8px;
            transition: color 0.2s;
        }

        .forgot:hover { color: var(--accent2); }

        .error-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,77,109,0.08);
            border: 1px solid rgba(255,77,109,0.2);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--error);
            font-size: 13px;
            margin-bottom: 20px;
            animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            background: var(--accent2);
            color: #0a0a0f;
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
            animation: fadeUp 0.5s 0.5s both;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -75%;
            width: 50%; height: 200%;
            background: rgba(255,255,255,0.25);
            transform: skewX(-20deg);
            transition: left 0.5s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,245,200,0.35);
        }

        .btn:hover::after { left: 150%; }
        .btn:active { transform: translateY(0); }

        .footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 13px;
            color: var(--muted);
            animation: fadeUp 0.5s 0.6s both;
        }

        .footer-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(200,255,0,0.3);
            transition: border-color 0.2s;
        }

        .footer-text a:hover { border-color: var(--accent); }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 28px 0;
            animation: fadeUp 0.5s 0.52s both;
        }
    </style>
</head>
<body>

<div class="bg-canvas">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>

<div class="card">
    <div class="badge">
        <span class="badge-dot"></span>
        Bem-vindo de volta
    </div>

    <h1>Fazer <span>Login</span></h1>
    <p class="subtitle">Entre com suas credenciais para continuar</p>

    <form action="/auth/login" method="post">
        <div class="field">
            <label for="email">Email</label>
            <div class="input-wrap">
                <input type="email" id="email" name="email" placeholder="seu@email.com">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </div>
        </div>

        <div class="field">
            <label for="senha">Senha</label>
            <div class="input-wrap">
                <input type="password" id="senha" name="senha" placeholder="Sua senha">
                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <a href="/auth/esqueci-senha" class="forgot">Esqueceu a senha?</a>
        </div>

        {% if error %}
            <div class="error-msg">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ error }}
            </div>
        {% endif %}

        <button type="submit" class="btn">Entrar →</button>
    </form>

    <div class="divider"></div>

    <p class="footer-text">Não tem uma conta? <a href="/auth/cadastro">Cadastre-se</a></p>
</div>

</body>
</html>
